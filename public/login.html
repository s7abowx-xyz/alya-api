<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تسجيل الدخول · ALYA API</title>
<link rel="stylesheet" href="/assets/css/style.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          deep: '#071714',
          panel: '#0c211d',
          surface: '#10312b',
          teal: '#2dd4bf',
          gold: '#f0b429',
        }
      }
    }
  }
</script>
</head>
<body class="min-h-screen bg-deep">
  <div class="min-h-screen grid lg:grid-cols-2">

    <!-- اللوحة البصرية / عنصر التوقيع -->
    <div class="relative hidden lg:flex flex-col justify-between overflow-hidden bg-panel border-l border-[var(--border-line)] p-12">
      <div class="absolute inset-0 grid-bg"></div>

      <div class="relative z-10">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-md bg-teal/20 border border-teal flex items-center justify-center">
            <span class="text-teal font-display font-bold">A</span>
          </div>
          <span class="font-display text-lg font-bold text-white">ALYA API</span>
        </div>
      </div>

      <div class="relative z-10 flex-1 flex items-center justify-center">
        <div class="api-pulse w-[380px] h-[380px]">
          <div class="pulse-ring" style="width:120px;height:120px;top:130px;right:130px;"></div>
          <div class="pulse-ring" style="width:120px;height:120px;top:130px;right:130px;animation-delay:1.1s;"></div>
          <div class="pulse-ring" style="width:120px;height:120px;top:130px;right:130px;animation-delay:2.2s;"></div>

          <div class="pulse-node" style="top:184px;right:184px;width:14px;height:14px;"></div>
          <div class="pulse-node gold" style="top:40px;right:60px;"></div>
          <div class="pulse-node" style="top:70px;right:300px;"></div>
          <div class="pulse-node" style="top:300px;right:40px;"></div>
          <div class="pulse-node gold" style="top:320px;right:270px;"></div>
          <div class="pulse-node" style="top:60px;right:190px;"></div>

          <div class="pulse-line" style="width:170px;top:100px;right:80px;transform:rotate(35deg);"></div>
          <div class="pulse-line" style="width:220px;top:95px;right:270px;transform:rotate(-25deg);"></div>
          <div class="pulse-line" style="width:200px;top:270px;right:60px;transform:rotate(-40deg);"></div>
          <div class="pulse-line" style="width:230px;top:290px;right:250px;transform:rotate(20deg);"></div>
        </div>
      </div>

      <div class="relative z-10 max-w-sm">
        <h2 class="font-display text-2xl font-bold text-white leading-relaxed">
          بنية تحتية موحّدة لكل طلبات API الخاصة بك
        </h2>
        <p class="text-muted mt-3 leading-loose" style="color:var(--text-muted)">
          مصادقة آمنة، مفاتيح API لكل مستخدم، وتحكم كامل بجلساتك — كل هذا في مكان واحد.
        </p>
      </div>
    </div>

    <!-- نموذج تسجيل الدخول -->
    <div class="flex items-center justify-center p-6 sm:p-12">
      <div class="w-full max-w-sm">
        <div class="lg:hidden flex items-center gap-2 mb-8 justify-center">
          <div class="w-8 h-8 rounded-md bg-teal/20 border border-teal flex items-center justify-center">
            <span class="text-teal font-display font-bold">A</span>
          </div>
          <span class="font-display text-lg font-bold text-white">ALYA API</span>
        </div>

        <h1 class="font-display text-2xl font-bold text-white">مرحبًا بعودتك</h1>
        <p class="mt-2 text-sm" style="color:var(--text-muted)">سجّل الدخول للوصول إلى لوحة تحكم مشاريعك ومفاتيح الـ API الخاصة بك</p>

        <div id="form-error" class="hidden mt-5 rounded-lg border border-red-500/40 bg-red-500/10 text-red-300 text-sm px-4 py-3"></div>

        <form id="login-form" class="mt-6 space-y-4">
          <div>
            <label for="email" class="block text-sm mb-1.5" style="color:var(--text-muted)">البريد الإلكتروني</label>
            <input id="email" type="email" required autocomplete="email"
              class="input-field w-full rounded-lg px-4 py-2.5 text-sm"
              placeholder="you@example.com" />
          </div>
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label for="password" class="block text-sm" style="color:var(--text-muted)">كلمة المرور</label>
            </div>
            <input id="password" type="password" required autocomplete="current-password"
              class="input-field w-full rounded-lg px-4 py-2.5 text-sm"
              placeholder="••••••••" />
          </div>

          <button id="submit-btn" type="submit" class="btn-primary w-full rounded-lg py-2.5 text-sm mt-2">
            تسجيل الدخول
          </button>
        </form>

        <p class="text-sm text-center mt-6" style="color:var(--text-muted)">
          ليس لديك حساب؟
          <a href="/register.html" class="link-teal font-medium">أنشئ حسابًا جديدًا</a>
        </p>
      </div>
    </div>
  </div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
</body>
</html>
